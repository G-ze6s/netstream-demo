<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        <header class="hero">
            <div>
                <p class="eyebrow">Full Stack CRUD Project</p>
                <h1>Book Manager</h1>
                <p class="subtitle">Add, update, search, and delete books using Spring Boot, MySQL, and plain JavaScript.</p>
            </div>
        </header>

        <section id="alertBox" class="alert hidden"></section>

        <main class="layout">
            <section class="card form-card">
                <h2 id="formTitle">Add New Book</h2>
                <form id="bookForm">
                    <input type="hidden" id="bookId">

                    <label for="title">Title</label>
                    <input type="text" id="title" placeholder="Enter book title" required>

                    <label for="author">Author</label>
                    <input type="text" id="author" placeholder="Enter author name" required>

                    <label for="genre">Genre</label>
                    <input type="text" id="genre" placeholder="Enter genre" required>

                    <label for="price">Price</label>
                    <input type="number" id="price" placeholder="Enter price" min="0" step="0.01" required>

                    <label for="availableCopies">Available Copies</label>
                    <input type="number" id="availableCopies" placeholder="Enter available copies" min="0" required>

                    <div class="button-row">
                        <button type="submit" class="primary-btn" id="submitButton">Save Book</button>
                        <button type="button" class="secondary-btn" id="clearButton">Clear</button>
                    </div>
                </form>
            </section>

            <section class="card list-card">
                <div class="list-header">
                    <div>
                        <h2>Book List</h2>
                        <p>Manage your library records easily.</p>
                    </div>
                    <input type="text" id="searchInput" placeholder="Search by title, author, or genre">
                </div>

                <div id="bookList" class="book-list"></div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
